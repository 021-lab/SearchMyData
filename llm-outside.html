<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LLM Outside</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  input, textarea { user-select: text; -webkit-user-select: text; }

  /* ── Header ── */
  header {
    background: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e0e0e0;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    flex-shrink: 0;
    z-index: 10;
  }

  .header-title {
    display: flex;
    flex-direction: column;
  }

  .header-title h1 { font-size: 17px; font-weight: 700; color: #1a1a2e; }

  .model-badge {
    font-size: 11px;
    color: #888;
    margin-top: 1px;
  }

  .header-actions { display: flex; gap: 8px; }

  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: #f0f2f5;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    transition: background 0.15s;
  }
  .icon-btn:active { background: #e0e2e5; }

  /* ── Settings panel ── */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .settings-overlay.open { opacity: 1; pointer-events: all; }

  .settings-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(320px, 88vw);
    background: #fff;
    padding: 0;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .settings-overlay.open .settings-panel { transform: translateX(0); }

  .settings-header {
    padding: 16px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 1;
  }
  .settings-header h2 { font-size: 16px; font-weight: 700; color: #1a1a2e; }

  .settings-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 16px; }

  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }

  .settings-input {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    outline: none;
    color: #1a1a2e;
    background: #fafafa;
    transition: border-color 0.15s;
    font-family: monospace;
  }
  .settings-input:focus { border-color: #007aff; background: #fff; }

  select.settings-input { font-family: inherit; cursor: pointer; }

  .settings-textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    outline: none;
    color: #1a1a2e;
    background: #fafafa;
    transition: border-color 0.15s;
    resize: none;
    min-height: 90px;
    line-height: 1.45;
    font-family: inherit;
  }
  .settings-textarea:focus { border-color: #007aff; background: #fff; }

  .save-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: #007aff;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: auto;
    transition: background 0.15s;
  }
  .save-btn:active { background: #005fcb; }

  /* ── Chat area ── */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overscroll-behavior: contain;
  }

  .empty-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #bbb;
    gap: 10px;
    padding: 40px 20px;
    text-align: center;
  }
  .empty-chat .icon { font-size: 48px; }
  .empty-chat p { font-size: 14px; line-height: 1.5; }

  /* ── Message bubbles ── */
  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 82%;
  }
  .msg-row.user { align-self: flex-end; align-items: flex-end; }
  .msg-row.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-row.user .bubble {
    background: #007aff;
    color: #fff;
    border-bottom-right-radius: 5px;
  }
  .msg-row.assistant .bubble {
    background: #fff;
    color: #1a1a2e;
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .msg-time {
    font-size: 10px;
    color: #bbb;
    margin-top: 3px;
    padding: 0 4px;
  }

  /* Streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: #007aff;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s infinite;
    border-radius: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Error bubble */
  .error-bubble {
    background: #fff0f0;
    border: 1px solid #ffcdd2;
    color: #c62828;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    align-self: center;
    max-width: 90%;
  }

  /* ── Input bar ── */
  .input-bar {
    background: #fff;
    border-top: 1px solid #e8e8e8;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    border: 1.5px solid #e0e0e0;
    border-radius: 22px;
    padding: 9px 16px;
    font-size: 15px;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    background: #fafafa;
    font-family: inherit;
    transition: border-color 0.15s;
    overflow-y: auto;
  }
  #msg-input:focus { border-color: #007aff; background: #fff; }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: #007aff;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  #send-btn:active { background: #005fcb; transform: scale(0.92); }
  #send-btn:disabled { background: #c0c0c0; transform: none; cursor: default; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>LLM Outside</h1>
    <span class="model-badge" id="model-badge">—</span>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="clear-btn" title="Очистить чат">🗑</button>
    <button class="icon-btn" id="settings-btn" title="Настройки">⚙️</button>
  </div>
</header>

<div id="chat-area">
  <div class="empty-chat" id="empty-state">
    <div class="icon">🤖</div>
    <p>Введите API-ключ в настройках<br>и начните диалог</p>
  </div>
</div>

<div class="input-bar">
  <textarea id="msg-input" placeholder="Сообщение…" rows="1"></textarea>
  <button id="send-btn" disabled>↑</button>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel">
    <div class="settings-header">
      <h2>Настройки</h2>
      <button class="icon-btn" id="settings-close">✕</button>
    </div>
    <div class="settings-body">
      <div class="field-group">
        <label class="field-label">API Key (Anthropic)</label>
        <input type="password" class="settings-input" id="api-key-input" placeholder="sk-ant-…" autocomplete="off">
      </div>
      <div class="field-group">
        <label class="field-label">Модель</label>
        <select class="settings-input" id="model-select">
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
          <option value="claude-opus-4-6">Claude Opus 4.6</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Системный промпт</label>
        <textarea class="settings-textarea" id="system-input" placeholder="Ты — полезный ассистент…"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Макс. токенов</label>
        <select class="settings-input" id="max-tokens-select">
          <option value="1024">1 024</option>
          <option value="2048" selected>2 048</option>
          <option value="4096">4 096</option>
          <option value="8192">8 192</option>
        </select>
      </div>
      <button class="save-btn" id="save-btn">Сохранить</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
let config = {
  apiKey:     '',
  model:      'claude-sonnet-4-6',
  system:     '',
  maxTokens:  2048,
};
let history = []; // {role, content}
let streaming = false;

// ── Persist ────────────────────────────────────────────────────────────────────
function loadConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem('llm-outside-config') || '{}');
    config = { ...config, ...saved };
  } catch {}
}
function saveConfig() {
  localStorage.setItem('llm-outside-config', JSON.stringify(config));
}

// ── Settings panel ─────────────────────────────────────────────────────────────
const overlay   = document.getElementById('settings-overlay');
const apiInput  = document.getElementById('api-key-input');
const modelSel  = document.getElementById('model-select');
const systemIn  = document.getElementById('system-input');
const maxTokSel = document.getElementById('max-tokens-select');

function openSettings() {
  apiInput.value  = config.apiKey;
  modelSel.value  = config.model;
  systemIn.value  = config.system;
  maxTokSel.value = config.maxTokens;
  overlay.classList.add('open');
}
function closeSettings() { overlay.classList.remove('open'); }

document.getElementById('settings-btn').addEventListener('click', openSettings);
document.getElementById('settings-close').addEventListener('click', closeSettings);
overlay.addEventListener('click', e => { if (e.target === overlay) closeSettings(); });

document.getElementById('save-btn').addEventListener('click', () => {
  config.apiKey    = apiInput.value.trim();
  config.model     = modelSel.value;
  config.system    = systemIn.value.trim();
  config.maxTokens = parseInt(maxTokSel.value);
  saveConfig();
  updateUI();
  closeSettings();
});

function updateUI() {
  const names = {
    'claude-sonnet-4-6':        'Claude Sonnet 4.6',
    'claude-opus-4-6':          'Claude Opus 4.6',
    'claude-haiku-4-5-20251001':'Claude Haiku 4.5',
  };
  document.getElementById('model-badge').textContent = names[config.model] || config.model;
  document.getElementById('send-btn').disabled = !config.apiKey || streaming;
}

// ── Clear chat ─────────────────────────────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', () => {
  if (streaming) return;
  history = [];
  renderChatArea();
});

// ── Chat rendering ─────────────────────────────────────────────────────────────
const chatArea = document.getElementById('chat-area');

function renderChatArea() {
  chatArea.innerHTML = '';
  if (history.length === 0) {
    const el = document.createElement('div');
    el.className = 'empty-chat';
    el.innerHTML = config.apiKey
      ? '<div class="icon">💬</div><p>Начните диалог</p>'
      : '<div class="icon">🤖</div><p>Введите API-ключ в настройках<br>и начните диалог</p>';
    chatArea.appendChild(el);
    return;
  }
  history.forEach(msg => appendBubble(msg.role, msg.content));
  scrollToBottom();
}

function appendBubble(role, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });

  row.appendChild(bubble);
  row.appendChild(time);
  chatArea.appendChild(row);
  return bubble;
}

function showError(msg) {
  const el = document.createElement('div');
  el.className = 'error-bubble';
  el.textContent = '⚠ ' + msg;
  chatArea.appendChild(el);
  scrollToBottom();
}

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── Input auto-resize ──────────────────────────────────────────────────────────
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
});

document.getElementById('send-btn').addEventListener('click', doSend);

// ── Send & stream ──────────────────────────────────────────────────────────────
async function doSend() {
  const text = msgInput.value.trim();
  if (!text || !config.apiKey || streaming) return;

  // Clear empty state
  const emptyEl = chatArea.querySelector('.empty-chat');
  if (emptyEl) emptyEl.remove();

  // Show user message
  history.push({ role: 'user', content: text });
  appendBubble('user', text);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  scrollToBottom();

  // Prepare assistant bubble
  streaming = true;
  updateUI();

  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  bubble.appendChild(cursor);
  row.appendChild(bubble);
  chatArea.appendChild(row);
  scrollToBottom();

  let assistantText = '';

  try {
    const body = {
      model: config.model,
      max_tokens: config.maxTokens,
      stream: true,
      messages: history,
    };
    if (config.system) body.system = config.system;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': config.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-allow-browser': 'true',
        'content-type': 'application/json',
      },
      body: JSON.stringify(body),
    });

    if (!response.ok) {
      let errMsg = `HTTP ${response.status}`;
      try { const j = await response.json(); errMsg = j.error?.message || errMsg; } catch {}
      throw new Error(errMsg);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop(); // keep incomplete last line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (!data || data === '[DONE]') continue;
        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
            assistantText += evt.delta.text;
            bubble.textContent = assistantText;
            bubble.appendChild(cursor);
            scrollToBottom();
          }
        } catch {}
      }
    }

    // Finalize
    cursor.remove();
    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    timeEl.textContent = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
    row.appendChild(timeEl);
    history.push({ role: 'assistant', content: assistantText });

  } catch (err) {
    bubble.remove();
    if (row.parentNode) row.remove();
    history.pop(); // remove user message from history on error
    showError(err.message);
  } finally {
    streaming = false;
    updateUI();
  }
}

// ── Init ───────────────────────────────────────────────────────────────────────
loadConfig();
updateUI();
renderChatArea();
if (!config.apiKey) openSettings();
</script>
</body>
</html>
